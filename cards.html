<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Thumbnail Portfolio</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0d0d0d;
      font-family:Arial, sans-serif;
      color:white;
      padding:40px 20px;
    }

    h1{
      text-align:center;
      font-size:42px;
      margin-bottom:50px;
      letter-spacing:1px;
    }

    .container{
      max-width:1400px;
      margin:auto;

      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:30px;
    }

    .card{
      overflow:hidden;
      border-radius:22px;
      background:#1a1a1a;
      transition:0.4s ease;
      cursor:pointer;

      box-shadow:
      0 10px 25px rgba(0,0,0,0.5);
    }

    .card:hover{
      transform:translateY(-10px) scale(1.02);

      box-shadow:
      0 15px 35px rgba(255,255,255,0.08);
    }

    .card img{
      width:100%;
      display:block;
      object-fit:cover;
    }

    @media(max-width:768px){

      h1{
        font-size:30px;
        margin-bottom:30px;
      }

      body{
        padding:20px;
      }

    }

  </style>
</head>

<body>
