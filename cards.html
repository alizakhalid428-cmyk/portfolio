<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thumbnail Portfolio</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0d0d0d;
      font-family:Arial, sans-serif;
      padding:40px 20px;
      color:white;
    }

    h1{
      text-align:center;
      font-size:42px;
      margin-bottom:50px;
      letter-spacing:1px;
    }

    .container{
      max-width:1400px;
      margin:auto;

      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:30px;
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:22px;
      background:#1b1b1b;

      transition:0.4s ease;
      cursor:pointer;

      box-shadow:
      0 10px 25px rgba(0,0,0,0.5);
    }

    .card:hover{
      transform:translateY(-10px) scale(1.02);

      box-shadow:
      0 15px 35px rgba(255,255,255,0.08);
    }

    .card img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }

    .card::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(
      to top,
      rgba(0,0,0,0.45),
      transparent
      );

      opacity:0;
      transition:0.3s ease;
    }

    .card:hover::after{
      opacity:1;
    }

    @media(max-width:768px){

      body{
        padding:20px;
      }

      h1{
        font-size:30px;
        margin-bottom:30px;
      }

    }

  </style>
</head>
