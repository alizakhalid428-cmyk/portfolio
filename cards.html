<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Thumbnails</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f0f0f;
      font-family:Arial, sans-serif;
      padding:40px;
      color:white;
    }

    .title{
      text-align:center;
      font-size:40px;
      margin-bottom:40px;
      font-weight:bold;
      letter-spacing:1px;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:30px;
      max-width:1400px;
      margin:auto;
    }

    .card{
      background:#1a1a1a;
      border-radius:20px;
      overflow:hidden;
      transition:0.4s ease;
      cursor:pointer;
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    .card:hover{
      transform:translateY(-10px) scale(1.02);
      box-shadow:0 15px 35px rgba(255,255,255,0.08);
    }

    .card img{
      width:100%;
      display:block;
      object-fit:cover;
    }

    @media(max-width:768px){
      body{
        padding:20px;
      }

      .title{
        font-size:28px;
      }
    }
  </style>
</head>

<body>

  <h1 class="title">My Thumbnail Portfolio</h1>

  <div class="container">

    <div class="card">
      <img src="https://i.postimg.cc/bwBjXzxv/feab4cf6624228c0ed9a20da63ab353955f846ad.png" alt="Thumbnail 1">
    </div>

    <div class="card">
      <img src="https://i.postimg.cc/9Q8cWPhC/70fe22fe6a50f9d737de7d80b345aa1f62410c39.png" alt="Thumbnail 2">
    </div>

    <div class="card">
      <img src="https://i.postimg.cc/L5tHRrHb/a952f47839dfe7975e47d77e38d840024dd53fe7.jpg" alt="Thumbnail 3">
    </div>

    <div class="card">
      <img src="https://i.postimg.cc/HkBkrDQG/30931809ad52321da1ae844402be613d2126e426.png" alt="Thumbnail 4">
    </div>

    <div class="card">
      <img src="https://i.postimg.cc/bJpCc5P6/moizawan-thumbnail-competitions.jpg" alt="Thumbnail 5">
    </div>

    <div class="card">
      <img src="https://i.postimg.cc/SK7drG9c/documentry.jpg" alt="Thumbnail 6">
    </div>

    <!-- NEW THUMBNAIL -->
    <div class="card">
      <img src="https://kommodo.ai/i/329yiCXpE1mwimBoGZc8" alt="Thumbnail 7">
    </div>

  </div>

</body>
</html>
